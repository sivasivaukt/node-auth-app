server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # try_files order:
        #   $uri        — exact file match (e.g. /_next/static/..., favicon.ico)
        #   $uri/       — directory match → serves index.html inside it
        #                 (works because Next.js static export + trailingSlash:true
        #                  generates login/index.html, dashboard/index.html, etc.)
        #   =404        — no match → 404 (Next.js export generates a 404.html)
        try_files $uri $uri/ =404;
    }

    # Serve Next.js 404 page for unmatched routes
    error_page 404 /404.html;

    # Cache static assets aggressively; HTML files must not be cached
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(html)$ {
        add_header Cache-Control "no-cache";
    }
}
